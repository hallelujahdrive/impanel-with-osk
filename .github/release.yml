# Release Drafter 設定 — https://github.com/release-drafter/release-drafter
template: |
  ## What's Changed

  $CHANGES

exclude-labels:
  - ignore-for-release

categories:
  - title: Breaking Changes 🛠
    labels:
      - breaking-change
  - title: Bug Fixes 🐛
    labels:
      - fix
  - title: Features 🚀
    labels:
      - feat
  - title: Documentation 📚
    labels:
      - doc
  - title: Other Changes
